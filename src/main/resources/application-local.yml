spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ehps}
    username: ${DB_USERNAME:ehps}
    password: ${DB_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        # Override legacy application.properties (always-loaded default) which sets
        # default_schema=team2 — the new app owns the `public` schema.
        default_schema: ${DB_SCHEMA:public}
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:db/postgres/schema.sql
      data-locations: classpath:db/postgres/data.sql

jwt:
  secret: ${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMTIzNDU2Nzg5MDEyMzQ1Ng==}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
