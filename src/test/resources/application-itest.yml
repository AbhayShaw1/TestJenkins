spring:
  datasource:
    url: jdbc:h2:mem:ehps_itest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        # Override legacy application.properties (always-loaded default) which sets
        # default_schema=team2 / dialect=PostgreSQL — those must not leak into the new app.
        default_schema: public
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath:db/h2/schema.sql
      data-locations: classpath:db/h2/data.sql

jwt:
  secret: VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uMTIzNDU2Nzg5MDEyMzQ1Ng==
  expiration-ms: 86400000

server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
