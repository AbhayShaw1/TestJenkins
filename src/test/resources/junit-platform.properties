# Enable auto-detection of JUnit 5 extensions declared under META-INF/services.
# Registers com.app.ehps.support.SecurityContextCleanupExtension globally so a stale
# SecurityContextHolder (e.g. from legacy unit tests that never clear it) cannot leak into
# MockMvc integration tests. See SecurityContextCleanupExtension for the full rationale.
junit.jupiter.extensions.autodetection.enabled=true
